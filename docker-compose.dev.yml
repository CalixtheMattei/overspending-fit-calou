services:
  backend:
    command: >-
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - backend_imports_data:/app/data
    ports:
      - "8000:8000"

  frontend:
    ports:
      - "5173:80"
    build:
      context: ./frontend
      target: deps
    command: >-
      sh -c "set -eu;
      sha256sum package-lock.json | cut -d ' ' -f1 > /tmp/package-lock.sha256;
      if [ ! -f node_modules/.package-lock.sha256 ] || ! cmp -s /tmp/package-lock.sha256 node_modules/.package-lock.sha256; then
        npm ci;
        cp /tmp/package-lock.sha256 node_modules/.package-lock.sha256;
      fi;
      npm run dev -- --host 0.0.0.0 --port 80"
    environment:
      VITE_API_BASE_URL: /api
      VITE_DEV_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "300"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy

volumes:
  frontend_node_modules:
